<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - Plataforma Currículos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 26px;
            color: #1a1a1a;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #888;
            font-size: 14px;
        }
        
        .section {
            margin-bottom: 35px;
            padding-bottom: 35px;
            border-bottom: 1px solid #eee;
        }
        
        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .section h2 {
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        input {
            width: 100%;
            padding: 11px 13px;
            border: 2px solid #e5e5e5;
            border-radius: 8px;
            font-size: 14px;
            background: #f9f9f9;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        input::placeholder {
            color: #aaa;
        }
        
        .info-box {
            background: #f5f7fa;
            border-left: 4px solid #667eea;
            padding: 12px 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            font-size: 13px;
            color: #555;
        }
        
        .alert {
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            font-size: 13px;
            font-weight: 500;
        }
        
        .alert.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }
        
        .alert.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }
        
        .alert.show {
            display: block;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        button {
            flex: 1;
            padding: 11px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #e5e5e5;
            color: #333;
            box-shadow: none;
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: #d5d5d5;
        }
        
        .spinner {
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none !important;
        }
        
        .back-link {
            text-align: center;
            margin-top: 30px;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: color 0.3s;
        }
        
        .back-link a:hover {
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Configurações</h1>
            <p>Gerencie sua conta</p>
        </div>
        
        <!-- ALTERAR EMAIL -->
        <div class="section">
            <h2>Alterar Email</h2>
            
            <div class="info-box">
                Email atual: <strong id="current-email">-</strong>
            </div>
            
            <div class="alert error" id="alert-email-error">
                <span id="email-error-text"></span>
            </div>
            <div class="alert success" id="alert-email-success">
                <span id="email-success-text"></span>
            </div>
            
            <form id="emailForm">
                <div class="form-group">
                    <label for="new-email">Novo Email</label>
                    <input type="email" id="new-email" placeholder="novo@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="email-password">Confirme sua Senha</label>
                    <input type="password" id="email-password" placeholder="••••••••" required>
                </div>
                
                <div class="button-group">
                    <button type="submit">
                        <span class="spinner hidden" id="email-spinner"></span>
                        <span>Alterar Email</span>
                    </button>
                </div>
            </form>
        </div>
        
        <!-- ALTERAR SENHA -->
        <div class="section">
            <h2>Alterar Senha</h2>
            
            <div class="alert error" id="alert-password-error">
                <span id="password-error-text"></span>
            </div>
            <div class="alert success" id="alert-password-success">
                <span id="password-success-text"></span>
            </div>
            
            <form id="passwordForm">
                <div class="form-group">
                    <label for="current-password">Senha Atual</label>
                    <input type="password" id="current-password" placeholder="••••••••" required>
                </div>
                
                <div class="form-group">
                    <label for="new-password">Nova Senha</label>
                    <input type="password" id="new-password" placeholder="••••••••" required>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Confirmar Nova Senha</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required>
                </div>
                
                <div class="button-group">
                    <button type="submit">
                        <span class="spinner hidden" id="password-spinner"></span>
                        <span>Alterar Senha</span>
                    </button>
                </div>
            </form>
        </div>
        
        <div class="back-link">
            <a href="#" id="backToFeedLink">← Voltar ao Feed</a>
            <script>
                const userData = JSON.parse(localStorage.getItem('user_data') || '{}');
                const backToFeedLink = document.getElementById('backToFeedLink');
                if (userData.tipo === 'empresa') {
                    backToFeedLink.href = 'feed-empresa.html';
                } else {
                    backToFeedLink.href = 'feed-candidato.html';
                }
            </script>
        </div>
    </div>
    
    <script>
        // Carregar email atual
        function loadUserData() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('current-email').textContent = user.email || '-';
        }
        
        // Alterar Email
        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const alertError = document.getElementById('alert-email-error');
            const alertSuccess = document.getElementById('alert-email-success');
            const errorText = document.getElementById('email-error-text');
            const successText = document.getElementById('email-success-text');
            const spinner = document.getElementById('email-spinner');
            const btn = document.querySelector('#emailForm button[type="submit"]');
            
            alertError.classList.remove('show');
            alertSuccess.classList.remove('show');
            
            const newEmail = document.getElementById('new-email').value;
            const password = document.getElementById('email-password').value;
            const token = localStorage.getItem('token');
            
            btn.disabled = true;
            spinner.classList.remove('hidden');
            
            try {
                const response = await fetch('http://localhost:5000/api/auth/change-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ new_email: newEmail, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Erro ao alterar email');
                }
                
                // Atualizar localStorage
                const user = JSON.parse(localStorage.getItem('user'));
                user.email = newEmail;
                localStorage.setItem('user', JSON.stringify(user));
                
                successText.textContent = 'Email alterado com sucesso!';
                alertSuccess.classList.add('show');
                
                // Limpar formulário
                document.getElementById('emailForm').reset();
                loadUserData();
                
                setTimeout(() => {
                    alertSuccess.classList.remove('show');
                }, 3000);
                
            } catch (error) {
                errorText.textContent = error.message;
                alertError.classList.add('show');
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        });
        
        // Alterar Senha
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const alertError = document.getElementById('alert-password-error');
            const alertSuccess = document.getElementById('alert-password-success');
            const errorText = document.getElementById('password-error-text');
            const successText = document.getElementById('password-success-text');
            const spinner = document.getElementById('password-spinner');
            const btn = document.querySelector('#passwordForm button[type="submit"]');
            
            alertError.classList.remove('show');
            alertSuccess.classList.remove('show');
            
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const token = localStorage.getItem('token');
            
            // Validar senhas
            if (newPassword !== confirmPassword) {
                errorText.textContent = 'As senhas não correspondem';
                alertError.classList.add('show');
                return;
            }
            
            if (newPassword.length < 6) {
                errorText.textContent = 'A nova senha deve ter pelo menos 6 caracteres';
                alertError.classList.add('show');
                return;
            }
            
            if (currentPassword === newPassword) {
                errorText.textContent = 'A nova senha deve ser diferente da atual';
                alertError.classList.add('show');
                return;
            }
            
            btn.disabled = true;
            spinner.classList.remove('hidden');
            
            try {
                const response = await fetch('http://localhost:5000/api/auth/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ 
                        current_password: currentPassword, 
                        new_password: newPassword 
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Erro ao alterar senha');
                }
                
                successText.textContent = 'Senha alterada com sucesso!';
                alertSuccess.classList.add('show');
                
                // Limpar formulário
                document.getElementById('passwordForm').reset();
                
                setTimeout(() => {
                    alertSuccess.classList.remove('show');
                }, 3000);
                
            } catch (error) {
                errorText.textContent = error.message;
                alertError.classList.add('show');
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        });
        
        // Carregar dados ao abrir a página
        loadUserData();
    </script>
</body>
</html>
