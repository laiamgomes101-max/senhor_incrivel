<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Curriculo</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .register-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 1rem;
    }

    .register-wrapper {
      width: 100%;
      max-width: 500px;
    }

    .register-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 2rem;
    }

    .register-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .register-logo {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .register-subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .form-control {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 1rem;
      transition: all var(--transition);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .form-group.tipo-usuario {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .tipo-option {
      position: relative;
    }

    .tipo-option input[type="radio"] {
      display: none;
    }

    .tipo-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1.5rem;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 600;
      color: var(--text-secondary);
    }

    .tipo-option input[type="radio"]:checked + .tipo-label {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
    }

    .btn-register {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-register:hover:not(:disabled) {
      background: var(--primary-dark);
      box-shadow: 0 8px 20px rgba(10, 102, 194, 0.3);
      transform: translateY(-2px);
    }

    .btn-register:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .register-footer {
      margin-top: 2rem;
      text-align: center;
      border-top: 1px solid var(--border-color);
      padding-top: 1.5rem;
    }

    .register-footer p {
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .btn-login {
      background: var(--bg-secondary);
      color: var(--primary);
      border: 2px solid var(--primary);
      text-decoration: none;
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      transition: all var(--transition);
    }

    .btn-login:hover {
      background: var(--primary);
      color: white;
    }

    .error-message {
      color: var(--danger);
      font-size: 0.875rem;
      margin-top: 0.5rem;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .password-strength {
      margin-top: 0.5rem;
      height: 4px;
      background: var(--border-light);
      border-radius: 2px;
      overflow: hidden;
    }

    .password-strength-bar {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      transition: all var(--transition);
    }

    .password-strength-bar.weak {
      width: 33%;
      background: var(--danger);
    }

    .password-strength-bar.medium {
      width: 66%;
      background: var(--warning);
    }

    .password-strength-bar.strong {
      width: 100%;
      background: var(--success);
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="register-wrapper">
      <div class="register-card">
        <!-- Header -->
        <div class="register-header">
          <div class="register-logo">CurriculoHub</div>
          <p class="register-subtitle">Crie sua conta</p>
        </div>

        <!-- Tipo de Usuário -->
        <div class="form-group tipo-usuario">
          <div class="tipo-option">
            <input type="radio" id="tipo-candidato" name="tipo_usuario" value="candidato" checked>
            <label for="tipo-candidato" class="tipo-label">
              <span></span>
              <span>Candidato</span>
            </label>
          </div>
          <div class="tipo-option">
            <input type="radio" id="tipo-empresa" name="tipo_usuario" value="empresa">
            <label for="tipo-empresa" class="tipo-label">
              <span>🏢</span>
              <span>Empresa</span>
            </label>
          </div>
        </div>

        <!-- Formulário -->
        <form id="registerForm">
          <!-- Nome -->
          <div class="form-group">
            <label for="nome">Nome Completo / Nome da Empresa</label>
            <input 
              type="text" 
              id="nome" 
              class="form-control" 
              placeholder="seu nome"
              required
            >
            <div class="error-message" id="nomeError"></div>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label for="email">Email</label>
            <input 
              type="email" 
              id="email" 
              class="form-control" 
              placeholder="seu@email.com"
              required
            >
            <div class="error-message" id="emailError"></div>
          </div>

          <!-- Senha -->
          <div class="form-group">
            <label for="senha">Senha</label>
            <input 
              type="password" 
              id="senha" 
              class="form-control" 
              placeholder="••••••••"
              required
            >
            <div class="password-strength">
              <div class="password-strength-bar" id="strengthBar"></div>
            </div>
            <small id="strengthText" style="color: var(--text-light);">Força: Fraca</small>
            <div class="error-message" id="senhaError"></div>
          </div>

          <!-- Confirmar Senha -->
          <div class="form-group">
            <label for="senhaConfirm">Confirmar Senha</label>
            <input 
              type="password" 
              id="senhaConfirm" 
              class="form-control" 
              placeholder="••••••••"
              required
            >
            <div class="error-message" id="senhaConfirmError"></div>
          </div>

          <!-- Termos -->
          <div class="form-group">
            <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: 400; margin-bottom: 0;">
              <input type="checkbox" id="termos" required style="width: auto;">
              <span>Concordo com os <a href="#">Termos de Serviço</a> e <a href="#">Política de Privacidade</a></span>
            </label>
            <div class="error-message" id="termosError"></div>
          </div>

          <!-- Botão Registrar -->
          <button type="submit" class="btn-register">
            <span class="btn-text">Criar Conta</span>
          </button>

          <!-- Erro Geral -->
          <div class="error-message" id="generalError" style="text-align: center; margin-top: 1rem;"></div>
        </form>

        <!-- Footer -->
        <div class="register-footer">
          <p>Já possui conta?</p>
          <a href="login.html" class="btn-login">Fazer Login</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="assets/js/api.js"></script>
  <script>
    redirecionarSeAutenticado();

    const form = document.getElementById('registerForm');
    const nomeInput = document.getElementById('nome');
    const emailInput = document.getElementById('email');
    const senhaInput = document.getElementById('senha');
    const senhaConfirmInput = document.getElementById('senhaConfirm');
    const termosInput = document.getElementById('termos');
    const strengthBar = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');
    const btnSubmit = form.querySelector('button[type="submit"]');

    // Verificar força da senha
    senhaInput.addEventListener('input', () => {
      const senha = senhaInput.value;
      let force = 0;

      if (senha.length >= 8) force++;
      if (/[a-z]/.test(senha) && /[A-Z]/.test(senha)) force++;
      if (/[0-9]/.test(senha)) force++;
      if (/[^a-zA-Z0-9]/.test(senha)) force++;

      const levels = ['Fraca', 'Média', 'Forte', 'Muito Forte'];
      const classNames = ['weak', 'medium', 'strong', 'strong'];

      strengthBar.className = 'password-strength-bar ' + classNames[Math.min(force - 1, 3)];
      strengthText.textContent = 'Força: ' + levels[Math.min(force - 1, 3)];
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Limpar erros
      document.querySelectorAll('.error-message').forEach(el => el.textContent = '');

      const nome = nomeInput.value.trim();
      const email = emailInput.value.trim();
      const senha = senhaInput.value;
      const senhaConfirm = senhaConfirmInput.value;
      const tipoUsuario = document.querySelector('input[name="tipo_usuario"]:checked').value;

      // Validar
      let hasError = false;

      if (!nome) {
        document.getElementById('nomeError').textContent = 'Nome é obrigatório';
        hasError = true;
      }

      if (!email) {
        document.getElementById('emailError').textContent = 'Email é obrigatório';
        hasError = true;
      }

      if (!senha) {
        document.getElementById('senhaError').textContent = 'Senha é obrigatória';
        hasError = true;
      } else if (senha.length < 6) {
        document.getElementById('senhaError').textContent = 'Senha deve ter no mínimo 6 caracteres';
        hasError = true;
      }

      if (senha !== senhaConfirm) {
        document.getElementById('senhaConfirmError').textContent = 'Senhas não correspondem';
        hasError = true;
      }

      if (!termosInput.checked) {
        document.getElementById('termosError').textContent = 'Você deve aceitar os termos';
        hasError = true;
      }

      if (hasError) return;

      // Desabilitar botão
      btnSubmit.disabled = true;
      const btnText = btnSubmit.querySelector('.btn-text');
      const originalText = btnText.textContent;
      btnText.innerHTML = '<span class="loader"></span> Criando conta...';

      try {
        let response;

        if (tipoUsuario === 'candidato') {
          response = await AuthAPI.registrarCandidato(email, senha, nome);
        } else {
          response = await AuthAPI.registrarEmpresa(email, senha, nome);
        }

        if (response.token) {
          Auth.setToken(response.token);
          Auth.setUserData({
            id: response.user.id,
            email: response.user.email,
            tipo: response.user.tipo
          });

          mostrarNotificacao('Sucesso', 'Conta criada com sucesso!', 'success');
          setTimeout(() => {
            if (response.user.tipo === 'empresa') {
              window.location.href = 'feed-empresa.html';
            } else {
              window.location.href = 'feed-candidato.html';
            }
          }, 1000);
        }
      } catch (error) {
        const errorDiv = document.getElementById('generalError');
        errorDiv.textContent = error.message || 'Erro ao criar conta.';
        errorDiv.classList.add('show');
        console.error('Erro de registro:', error);
      } finally {
        btnSubmit.disabled = false;
        btnText.textContent = originalText;
      }
    });
  </script>
</body>
</html>
